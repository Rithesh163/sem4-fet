<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Z-Index Stacker</title>

<style>

body{
background:linear-gradient(to right,#ff512f,#dd2476);
color:white;
text-align:center;
font-family:Arial,sans-serif;
}

.container{
position:relative;
width:320px;
height:320px;
margin:50px auto;
}

.card{
width:150px;
height:200px;
position:absolute;
border-radius:10px;
cursor:pointer;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

button{
padding:10px 20px;
cursor:pointer;
margin-top:20px;
border:none;
border-radius:8px;
background:#fff176;
font-weight:bold;
}

a{
text-decoration:none;
background:white;
color:#dd2476;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
display:inline-block;
margin-top:20px;
}

</style>

</head>

<body>

<h1 style="color:#fff176;">
Card Stacker
</h1>

<button id="resetBtn">
Reset Stack
</button>

<div id="app" class="container"></div>

<br>

<a href="https://sanjanadevadiga.github.io/4SEM-FET/">
My Resume
</a>

<script>

const app=document.getElementById('app');

const resetBtn=document.getElementById('resetBtn');

let highestZ=10;

const colors=['red','blue','green','orange','purple'];

let i=0;

while(i<5){

const card=document.createElement('div');

card.className='card';

card.style.backgroundColor=colors[i];

card.style.left=(i*30)+"px";

card.style.top=(i*30)+"px";

card.style.zIndex=i;

card.innerText="Card "+(i+1);

card.onclick=function(){

highestZ++;

this.style.zIndex=highestZ;

};

app.appendChild(card);

i++;

}

resetBtn.addEventListener('click',function(){

const allCards=document.getElementsByClassName('card');

let j=0;

while(j<allCards.length){

allCards[j].style.zIndex=j;

j++;

}

highestZ=10;

alert("Stack Reset!");

});

</script>

</body>
</html>
