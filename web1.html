<!DOCTYPE html>
<html>
<head>
    <title>My Improved Website</title>
    <style>
        /* This is the CSS section where the magic happens */
        body {
            background-color: #f0f2f5; /* Light grey/blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is my first basic HTML website, now with some style!</p>

        <h2>About Me</h2>
        <p>Hello, I am <strong>Rithesh</strong>. I am learning web development and exploring GitHub Pages.</p>

        <button onclick="alert('Hello! Thanks for clicking!')">Click Me</button>
    </div>

</body>
</html>
